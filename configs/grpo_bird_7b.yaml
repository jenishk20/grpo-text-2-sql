# GRPO config — Qwen2.5-Coder-7B on BIRD (single H200 80GB).
# Paths here are the cluster defaults; override on the CLI if they move.

model:
  # Merged SFT model produced by `python -m src.train.merge_adapter`.
  # (NOT the raw base — GRPO must start from the SFT checkpoint.)
  path: /scratch/phalle.y/sft_merged_7b

data:
  # Built once on the login node from HuggingFace (xu3kev/BIRD-SQL-data-train):
  #   export HF_HOME=/scratch/phalle.y/hf_cache
  #   python -m src.data.export_hf_to_json \
  #       --out /scratch/phalle.y/bird_train/train/train.json
  train_json: /scratch/phalle.y/bird_train/train/train.json
  # Directory of per-db folders: {db_root}/{db_id}/{db_id}.sqlite — used by the
  # reward to EXECUTE SQL. (Confirmed single-level: holds address/, airline/, ...)
  db_root: /scratch/phalle.y/bird_train/train/train_databases
  # auto = use the embedded HF `schema` field (matches SFT) if present, else read
  # the local DB; "db" = always read local DB; "embedded" = require HF schema.
  schema_source: auto
  sample_rows: 0          # >0 appends N example rows per table into the schema
  max_train_samples: null # set an int for quick runs; null = full train set

reward:
  binary: false           # false = layered (format/exec/correct); true = strict 0/1
  timeout: 30.0           # seconds per SQL execution
  w_format: 0.1           # credit for emitting extractable SQL
  w_exec: 0.1             # additional credit for SQL that runs without error
  correct_reward: 1.0     # result set matches gold

lora:
  r: 32                   # matches the SFT adapter rank
  alpha: 64
  dropout: 0.05
  target_modules: all-linear

grpo:
  output_dir: /scratch/phalle.y/results_bird_grpo_7b

  # --- group rollouts ---
  num_generations: 8            # G completions per prompt
  # TRL 1.5.1 has no max_prompt_length on GRPOConfig. We use this value to
  # pre-filter over-long prompts in build_dataset() and to size the vLLM engine.
  max_prompt_length: 4096       # H200 fits full BIRD schemas (was 1536 on A10G)
  max_completion_length: 512    # SQL is short
  # vLLM engine context window. Defaults to max_prompt_length + max_completion_length.
  vllm_max_model_length: 4608
  temperature: 0.9              # exploration during rollouts
  top_p: 1.0

  # --- batch / optimization ---
  # global batch = per_device * grad_accum * n_gpus must be divisible by num_generations
  # here: 8 * 4 * 1 = 32  ->  32 / 8 = 4 unique prompts per step
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-5
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  num_train_epochs: 1
  max_steps: 300                # capped first run; set to -1 for a full epoch
  beta: 0.04                    # KL coefficient (lower = drift further from SFT)
  scale_rewards: true
  bf16: true
  gradient_checkpointing: true

  # --- vLLM rollouts (colocate: train + generate share the one H200) ---
  # NOTE: TRL 1.5.1 officially supports vLLM 0.12-0.18; this env has 0.22. If
  # colocate errors during vLLM init/weight-sync, set use_vllm: false to fall
  # back to (slower) HF generation and unblock training.
  use_vllm: true
  vllm_mode: colocate
  vllm_gpu_memory_utilization: 0.35   # leave the rest for training; tune if OOM

  # --- logging / checkpoints ---
  logging_steps: 1
  save_steps: 100
  save_total_limit: 3
  log_completions: true
  seed: 42

# Weights & Biases. When enabled, training logs reward/loss/KL/completions.
# `wandb login` once on the login node, or set WANDB_API_KEY in the SLURM script.
wandb:
  enabled: true
  project: bird-grpo-7b
  entity: null                  # your wandb user/team, or null for default
  run_name: grpo-bird-7b
